<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Elevation Heatmap inside Circle (Mapbox GL JS)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css"
    rel="stylesheet"
  />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; inset: 0; }
    .panel{
      position:absolute; top:12px; left:12px; z-index:1;
      background:#fff; padding:10px 12px; border-radius:8px;
      font: 13px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      max-width: 320px;
    }
    .row { display:flex; gap:8px; align-items:center; margin:6px 0; }
    input[type="number"]{ width:110px; }
    button{ cursor:pointer; }
    code{ font-size:12px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <div><b>Elevation heatmap inside a circular polygon</b></div>
    <div class="row">
      <label>Radius (m)</label>
      <input id="radius" type="number" value="2000" min="100" step="100" />
    </div>
    <div class="row">
      <label>Grid step (m)</label>
      <input id="step" type="number" value="200" min="25" step="25" />
    </div>
    <div class="row">
      <button id="clear">Clear</button>
      <span>Click map to set center</span>
    </div>
    <div id="status"></div>
    <div style="margin-top:6px; color:#444;">
      Uses <code>mapbox.terrain-rgb</code> tiles + Turf circle/grid.
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <script>
    // 1) Put your token here
    mapboxgl.accessToken = MAPBOX_ACCESS_TOKEN

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/satellite-streets-v11", // "mapbox://styles/mapbox/dark-v11",
      center: [-118.292, 36.578], // Mount Whitney
      zoom: 11
    });

    const statusEl = document.getElementById("status");
    const radiusEl = document.getElementById("radius");
    const stepEl = document.getElementById("step");
    const clearBtn = document.getElementById("clear");

    // Terrain-RGB endpoint (pngraw is important)
    const TERRAIN_RGB = "mapbox://mapbox.terrain-rgb";

    // Decode Terrain-RGB pixel to meters (Mapbox formula)
    function decodeTerrainRGB(r, g, b) {
      return -10000 + ((r * 256 * 256 + g * 256 + b) * 0.1);
    }

    // Convert lngLat to tile + pixel coords for a given z
    function lngLatToTilePixel(lng, lat, z) {
      const latRad = (lat * Math.PI) / 180;
      const n = Math.pow(2, z);
      const x = (lng + 180) / 360 * n;
      const y = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;

      const tileX = Math.floor(x);
      const tileY = Math.floor(y);

      // pixel within tile (0..255) for 256px tiles
      const pixelX = Math.floor((x - tileX) * 256);
      const pixelY = Math.floor((y - tileY) * 256);

      return { tileX, tileY, pixelX, pixelY };
    }

    // Fetch a Terrain-RGB tile image and return ImageData
    async function fetchTileImageData(tileX, tileY, z) {
      // Mapbox tile URL template:
      // https://api.mapbox.com/v4/mapbox.terrain-rgb/{z}/{x}/{y}.pngraw?access_token=...
      const url = `https://api.mapbox.com/v4/mapbox.terrain-rgb/${z}/${tileX}/${tileY}.pngraw?access_token=${mapboxgl.accessToken}`;

      const res = await fetch(url);
      if (!res.ok) throw new Error(`Tile fetch failed ${res.status}`);
      const blob = await res.blob();

      const img = await createImageBitmap(blob);
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      return ctx.getImageData(0, 0, 256, 256);
    }

    // Sample elevation at a lon/lat using Terrain-RGB at a fixed zoom
    // Caches tiles so we don't refetch the same tile repeatedly.
    const tileCache = new Map();
    async function sampleElevation(lng, lat, z = 12) {
      const { tileX, tileY, pixelX, pixelY } = lngLatToTilePixel(lng, lat, z);
      const key = `${z}/${tileX}/${tileY}`;

      let imageData = tileCache.get(key);
      if (!imageData) {
        imageData = await fetchTileImageData(tileX, tileY, z);
        tileCache.set(key, imageData);
      }

      const idx = (pixelY * 256 + pixelX) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];

      return decodeTerrainRGB(r, g, b);
    }

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function ensureSourcesAndLayers() {
      if (!map.getSource("circle")) {
        map.addSource("circle", { type: "geojson", data: turf.featureCollection([]) });
      }
      if (!map.getLayer("circle-fill")) {
        map.addLayer({
          id: "circle-fill",
          type: "fill",
          source: "circle",
          paint: { "fill-color": "#2dd4bf", "fill-opacity": 0.12 }
        });
      }
      if (!map.getLayer("circle-line")) {
        map.addLayer({
          id: "circle-line",
          type: "line",
          source: "circle",
          paint: { "line-color": "#2dd4bf", "line-width": 2 }
        });
      }

      if (!map.getSource("samples")) {
        map.addSource("samples", { type: "geojson", data: turf.featureCollection([]) });
      }
      if (!map.getLayer("elev-heat")) {
        map.addLayer({
          id: "elev-heat",
          type: "heatmap",
          source: "samples",
          maxzoom: 15,
          paint: {
            // weight points by elevation (normalized later into 0..1)
            "heatmap-weight": ["coalesce", ["get", "w"], 0],
            "heatmap-intensity": [
              "interpolate", ["linear"], ["zoom"],
              8, 0.6,
              14, 1.8
            ],
            "heatmap-radius": [
              "interpolate", ["linear"], ["zoom"],
              8, 12,
              14, 40
            ],
            "heatmap-opacity": 0.85
          }
        });
      }

      // Optional: show sampled points (debug)
      if (!map.getLayer("samples-circles")) {
        map.addLayer({
          id: "samples-circles",
          type: "circle",
          source: "samples",
          paint: {
            "circle-radius": 2,
            "circle-opacity": 0.15
          }
        });
      }
    }

    function clearAll() {
      tileCache.clear();
      if (map.getSource("circle")) map.getSource("circle").setData(turf.featureCollection([]));
      if (map.getSource("samples")) map.getSource("samples").setData(turf.featureCollection([]));
      setStatus("");
    }

    clearBtn.addEventListener("click", clearAll);

    // Create grid points inside circle, sample elevations, build heatmap weights
    async function buildElevationHeatmap(centerLngLat) {
      ensureSourcesAndLayers();
      tileCache.clear();

      const radiusM = Number(radiusEl.value);
      const stepM = Number(stepEl.value);

      // Turf circle: radius in kilometers
      const circle = turf.circle([centerLngLat.lng, centerLngLat.lat], radiusM / 1000, {
        steps: 128,
        units: "kilometers"
      });

      map.getSource("circle").setData(circle);

      // Create a square bbox around the circle, then make a point grid, filter to inside circle
      const bbox = turf.bbox(circle);

      // Convert step meters to degrees-ish via Turf using kilometers grid cell side:
      const cellSideKm = stepM / 1000;

      // pointGrid yields points at cell centers
      const grid = turf.pointGrid(bbox, cellSideKm, { units: "kilometers" });
      const inside = grid.features.filter((pt) => turf.booleanPointInPolygon(pt, circle));

      setStatus(`Sampling ${inside.length} points…`);

      // Sample elevations (limit concurrency to be gentle)
      const Z = 12; // change to 13-14 for more detail (more tile fetches)
      const CONCURRENCY = 12;

      let i = 0;
      const results = new Array(inside.length);

      async function worker() {
        while (i < inside.length) {
          const idx = i++;
          const [lng, lat] = inside[idx].geometry.coordinates;
          try {
            const elev = await sampleElevation(lng, lat, Z);
            results[idx] = elev;
          } catch (e) {
            results[idx] = null;
          }
          if (idx % 50 === 0) setStatus(`Sampling ${idx + 1}/${inside.length}…`);
        }
      }

      await Promise.all(Array.from({ length: CONCURRENCY }, worker));

      // Compute min/max ignoring nulls
      const vals = results.filter((v) => typeof v === "number" && isFinite(v));
      if (!vals.length) {
        setStatus("No elevation samples (tile fetch failed or no access).");
        return;
      }
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = Math.max(1e-6, max - min);

      // Attach elevation + normalized weight (0..1)
      const fc = turf.featureCollection(
        inside.map((pt, idx) => {
          const elev = results[idx];
          if (typeof elev === "number" && isFinite(elev)) {
            const w = (elev - min) / range;
            // Make the heatmap reflect “hotter = higher” more strongly: keep heatmap-weight as w, but you can also raise it (e.g. w*w) before storing it.
            pt.properties = { elevation: elev, w: w };
          } else {
            pt.properties = { elevation: null, w: 0 };
          }
          return pt;
        })
      );

      map.getSource("samples").setData(fc);
      setStatus(`Done. Elevation range: ${min.toFixed(1)}m → ${max.toFixed(1)}m (z=${Z}).`);
    }

    map.on("load", () => {
      ensureSourcesAndLayers();

      map.addSource('mapbox-dem', {
        'type': 'raster-dem',
        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
        'tileSize': 512
      })

      // add the DEM source as a terrain layer with exaggerated height
      map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1 });

      map.on("click", async (e) => {
        try {
          await buildElevationHeatmap(e.lngLat);
        } catch (err) {
          console.error(err);
          setStatus(`Error: ${err.message}`);
        }
      });
    });
  </script>
</body>
</html>
