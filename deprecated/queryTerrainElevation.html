<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Elevation Heatmap inside Circle (queryTerrainElevation)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; inset: 0; }
    .panel{
      position:absolute; top:12px; left:12px; z-index:1;
      background:#fff; padding:10px 12px; border-radius:8px;
      font: 13px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      max-width: 360px;
    }
    .row { display:flex; gap:8px; align-items:center; margin:6px 0; }
    input[type="number"]{ width:140px; }
    button{ cursor:pointer; }
    code{ font-size:12px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <div><b>Elevation heatmap inside a circular polygon</b></div>
    <div class="row">
      <label>Radius (meters)</label>
      <!-- 10 nm ≈ 18520 meters -->
      <input id="radius" type="number" value="18520" min="100" step="100" />
    </div>
    <div class="row">
      <label>Grid step (meters)</label>
      <input id="step" type="number" value="500" min="50" step="50" />
    </div>
    <div class="row">
      <button id="clear">Clear</button>
      <span>Click map to set center</span>
    </div>
    <div id="status"></div>
    <div style="margin-top:6px; color:#444;">
      Uses <code>map.queryTerrainElevation()</code> + Turf circle/grid.
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <script>
    mapboxgl.accessToken = MAPBOX_ACCESS_TOKEN

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/satellite-streets-v11", // "mapbox://styles/mapbox/dark-v11",
      center: [-115.1343, 35.9728], // Henderson Executive Airport (KHND)
      zoom: 11
    });

    const statusEl = document.getElementById("status");
    const radiusEl = document.getElementById("radius");
    const stepEl = document.getElementById("step");
    const clearBtn = document.getElementById("clear");

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function ensureSourcesAndLayers() {
      if (!map.getSource("circle")) {
        map.addSource("circle", { type: "geojson", data: turf.featureCollection([]) });
      }
      if (!map.getLayer("circle-fill")) {
        map.addLayer({
          id: "circle-fill",
          type: "fill",
          source: "circle",
          paint: { "fill-color": "#2dd4bf", "fill-opacity": 0.12 }
        });
      }
      if (!map.getLayer("circle-line")) {
        map.addLayer({
          id: "circle-line",
          type: "line",
          source: "circle",
          paint: { "line-color": "#2dd4bf", "line-width": 10 }
        });
      }

      if (!map.getSource("samples")) {
        map.addSource("samples", { type: "geojson", data: turf.featureCollection([]) });
      }
      if (!map.getLayer("elev-heat")) {
        map.addLayer({
          id: "elev-heat",
          type: "heatmap",
          source: "samples",
          maxzoom: 15,
          paint: {
            // weight points by normalized elevation stored in property "w"
            "heatmap-weight": ["coalesce", ["get", "w"], 0],
            "heatmap-intensity": [
              "interpolate", ["linear"], ["zoom"],
              7, 0.6,
              14, 1.8
            ],
            "heatmap-radius": [
              "interpolate", ["linear"], ["zoom"],
              7, 10,
              14, 45
            ],
            "heatmap-opacity": 0.85
          }
        });
      }

      // Optional: sampled points (debug)
      if (!map.getLayer("samples-circles")) {
        map.addLayer({
          id: "samples-circles",
          type: "circle",
          source: "samples",
          paint: { "circle-radius": 2, "circle-opacity": 0.15 }
        });
      }
    }

    function clearAll() {
      if (map.getSource("circle")) map.getSource("circle").setData(turf.featureCollection([]));
      if (map.getSource("samples")) map.getSource("samples").setData(turf.featureCollection([]));
      setStatus("");
    }
    clearBtn.addEventListener("click", clearAll);

    // Wait until the map is "idle" (tiles loaded, no ongoing requests)
    function waitForIdle() {
      return new Promise((resolve) => {
        if (map.loaded() && map.isStyleLoaded() && map.areTilesLoaded()) return resolve();
        map.once("idle", resolve);
      });
    }

    // Sample elevation using Mapbox's DEM pipeline.
    // Returns null if unavailable (e.g., DEM tile not loaded yet).
    function sampleElevationFast(lng, lat) {
      const e = map.queryTerrainElevation([lng, lat], { exaggerated: false });
      return (typeof e === "number" && isFinite(e)) ? e : null;
    }

    // Builds a point grid inside a circle, samples elevations, pushes to a heatmap layer.
    async function buildElevationHeatmap(centerLngLat) {
      ensureSourcesAndLayers();

      const radiusM = Number(radiusEl.value);
      const stepM = Number(stepEl.value);

      // For large circles, users often zoom in/out.
      // Tie sampling resolution to zoom so you don’t oversample when zoomed out or undersample when zoomed in.
      // This is just a heuristic; adjust as needed.
      // function stepMetersForZoom(z) {
      //   if (z <= 8) return 1200;
      //   if (z <= 10) return 800;
      //   if (z <= 12) return 500;
      //   return 300;
      // }

      // 1) Build circle polygon
      const circle = turf.circle([centerLngLat.lng, centerLngLat.lat], radiusM / 1000, {
        steps: 128,
        units: "kilometers"
      });
      map.getSource("circle").setData(circle);

      // 2) Build grid points inside circle
      const bbox = turf.bbox(circle);
      const cellSideKm = stepM / 1000;

      const grid = turf.pointGrid(bbox, cellSideKm, { units: "kilometers" });
      const inside = grid.features.filter((pt) => turf.booleanPointInPolygon(pt, circle));

      // Optional safety cap for huge radii / tiny steps
      const MAX_POINTS = 12000;
      let points = inside;
      if (points.length > MAX_POINTS) {
        // downsample deterministically
        const stride = Math.ceil(points.length / MAX_POINTS);
        points = points.filter((_, idx) => idx % stride === 0);
      }

      setStatus(`Preparing DEM tiles for ${points.length} samples…`);

      // 3) Make sure DEM tiles are loading near the area:
      // Fit to circle then wait for idle so queryTerrainElevation returns numbers for most points.
      map.fitBounds(turf.bbox(circle), { padding: 40, duration: 450 });

      await waitForIdle();

      // 4) Sample elevations. Some may still be null (edge cases); we retry once after another idle.
      const elevs = new Array(points.length).fill(null);

      function doSampling(passLabel) {
        let nulls = 0;
        for (let i = 0; i < points.length; i++) {
          const [lng, lat] = points[i].geometry.coordinates;
          const e = sampleElevationFast(lng, lat);
          elevs[i] = e;
          if (e === null) nulls++;
        }
        return nulls;
      }

      setStatus(`Sampling elevations (pass 1)…`);
      let nullCount = doSampling("pass1");

      // If too many nulls, wait once more and retry.
      if (nullCount > Math.max(25, points.length * 0.05)) {
        setStatus(`Waiting for more DEM tiles… (${nullCount} missing)`);
        await waitForIdle();
        setStatus(`Sampling elevations (pass 2)…`);
        nullCount = doSampling("pass2");
      }

      // 5) Compute min/max (ignore nulls)
      const vals = elevs.filter((v) => typeof v === "number" && isFinite(v));
      if (!vals.length) {
        setStatus("No elevation samples available (DEM tiles not available/loaded or access issue).");
        return;
      }
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = Math.max(1e-6, max - min);

      // 6) Attach elevation + normalized weight (0..1)
      const fc = turf.featureCollection(
        points.map((pt, idx) => {
          const elev = elevs[idx];
          if (typeof elev === "number" && isFinite(elev)) {
            const w = (elev - min) / range;
            pt.properties = { elevation: elev, w };
          } else {
            pt.properties = { elevation: null, w: 0 };
          }
          return pt;
        })
      );

      map.getSource("samples").setData(fc);

      setStatus(
        `Done. ${points.length} pts. Elevation: ${min.toFixed(1)}m → ${max.toFixed(1)}m` +
        (nullCount ? ` (${nullCount} missing)` : ``)
      );
    }

    map.on("load", () => {
      // Add DEM source + enable terrain so queryTerrainElevation works
      map.addSource("mapbox-dem", {
        type: "raster-dem",
        url: "mapbox://mapbox.mapbox-terrain-dem-v1",
        tileSize: 512,
        maxzoom: 14
      });

      map.setTerrain({ source: "mapbox-dem", exaggeration: 1.0 });

      // Optional: a little hillshade for visual context
      map.addLayer({
        id: "hillshade",
        type: "hillshade",
        source: "mapbox-dem",
        paint: { "hillshade-exaggeration": 0.35 }
      });

      ensureSourcesAndLayers();

      map.on("click", async (e) => {
        try {
          await buildElevationHeatmap(e.lngLat);
        } catch (err) {
          console.error(err);
          setStatus(`Error: ${err.message}`);
        }
      });
    });
  </script>
</body>
</html>
